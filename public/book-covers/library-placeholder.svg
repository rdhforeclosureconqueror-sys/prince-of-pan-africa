<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900" role="img" aria-labelledby="title desc">
  <title id="title">Prince of Pan-Africa saved book cover placeholder</title>
  <desc id="desc">Gold and green framed default cover for saved library books.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#17120d"/><stop offset="1" stop-color="#3a2814"/></linearGradient></defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect x="38" y="38" width="524" height="824" fill="none" stroke="#d6b25e" stroke-width="8"/>
  <rect x="70" y="70" width="460" height="760" fill="none" stroke="#10b981" stroke-width="3"/>
  <text x="300" y="210" text-anchor="middle" fill="#f5e6b3" font-family="Georgia, serif" font-size="46" font-weight="700">PRINCE OF</text>
  <text x="300" y="275" text-anchor="middle" fill="#f5e6b3" font-family="Georgia, serif" font-size="46" font-weight="700">PAN-AFRICA</text>
  <text x="300" y="405" text-anchor="middle" fill="#fdecc3" font-family="Georgia, serif" font-size="40" font-weight="700">SAVED BOOK</text>
  <text x="300" y="460" text-anchor="middle" fill="#fdecc3" font-family="Georgia, serif" font-size="40" font-weight="700">LIBRARY</text>
  <text x="300" y="725" text-anchor="middle" fill="#d6b25e" font-family="Arial, sans-serif" font-size="24">Cover placeholder</text>
</svg>
