services:
  - type: web
    name: prince-of-pan-africa-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ENABLE_TEXT_BOOK_ORGANIZER
        value: "true"
      - key: SKILL_WORLD_TTS_URL
        value: https://aivoice-wmrv.onrender.com/speak
      - key: AIVOICE_BASE_URL
        value: https://aivoice-wmrv.onrender.com
      - key: OPENVOICE_URL
        value: https://ffmpeg-9xhs.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://simbawaujamaa.com,https://www.simbawaujamaa.com
      - key: SESSION_COOKIE_SAMESITE
        value: lax
      - key: SESSION_COOKIE_DOMAIN
        value: .simbawaujamaa.com
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: prince-of-pan-africa-db
          property: connectionString
      - key: AUDIO_STORAGE_DIR
        value: /var/data/static/audio
    disk:
      name: prince-of-pan-africa-media
      mountPath: /var/data
      sizeGB: 1

  - type: static
    name: prince-of-pan-africa-frontend
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.simbawaujamaa.com
      - key: VITE_ENABLE_TEXT_BOOK_ORGANIZER
        value: "true"


databases:
  - name: prince-of-pan-africa-db
    databaseName: prince_of_pan_africa
    user: prince_of_pan_africa
